# Skill taxonomy for resume analysis.
#
# canonical:  the display name returned in API responses
# category:   grouping label (used for future filtering / role inference)
# aliases:    additional strings that map to this skill (matched case-insensitively)
#             In NORMAL mode, the canonical name is also matched.
#             In STRICT mode, only the aliases below are matched — the canonical
#             bare token is too ambiguous (e.g. "go" fires on "category", "django").
# matchMode:  NORMAL (default) | STRICT

