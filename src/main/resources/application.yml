# =============================================================
# SERVER CONFIGURATION
# =============================================================
server:
  port: 8080                          # App runs on http://localhost:8080

# =============================================================
# DATABASE CONFIGURATION (PostgreSQL)
# =============================================================
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/career_os}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # =============================================================
  # JPA / HIBERNATE CONFIGURATION
  #
  # ddl-auto options:
  #   - none     → do nothing (production)
  #   - validate → only check if schema matches entities
  #   - update   → auto-create/update tables (good for development)
  #   - create   → drop and recreate tables on every startup
  #
  # We use "update" for development so that:
  #   - Tables are created automatically from @Entity classes
  #   - New fields are added without manual SQL
  #   - Existing data is preserved across restarts
  #
  # show-sql: true   → prints every SQL query to the console (for learning)
  # format_sql: true → makes those SQL logs readable
  # =============================================================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # =============================================================
  # FILE UPLOAD CONFIGURATION
  # Caps a single resume upload at 5MB. Anything larger is rejected
  # before it reaches our own size check in OnboardingService.
  # =============================================================
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

# =============================================================
# APPLICATION CONFIGURATION
# =============================================================
app:
  jwt:
    secret: ${JWT_SECRET:a-very-long-and-secure-random-secret-key-for-local-dev}
    expiration-ms: 86400000             # 24 hours in milliseconds
  resume:
    upload-dir: ${RESUME_UPLOAD_DIR:uploads/resumes}   # local-disk storage for now
